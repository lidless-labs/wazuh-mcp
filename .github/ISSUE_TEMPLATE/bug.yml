name: Bug report
description: Something is broken in wazuh-mcp itself, such as a tool, the Wazuh or indexer client, config parsing, redaction, or the docs.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you ask the agent to do, which tool ran, and what did you expect versus what you got?
      placeholder: |
        I asked the model to "search alerts for brute force" and `search_alerts` returned X.
        I expected Y.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: wazuh-mcp version
      description: The version from your install (e.g. `npm ls -g wazuh-mcp` or the `npx` version pulled).
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v20.18.0
    validations:
      required: true
  - type: input
    id: wazuh
    attributes:
      label: Wazuh version
      description: Manager version (e.g. from `get_wazuh_version` or the Wazuh dashboard). Note if the indexer is configured.
      placeholder: Wazuh 4.9.0, indexer configured
    validations:
      required: false
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: Claude Desktop, Claude Code, Codex CLI, OpenClaw, etc.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Full output
      description: Paste the relevant tool output and any server stderr. Keep enough for us to reproduce.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: scrub
    attributes:
      label: Pre-flight
      options:
        - label: I have removed any real hostnames, IPs, tokens, credentials, and unredacted paths from this report.
          required: true
